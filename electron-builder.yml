# electron-builder 配置

appId: com.mmmmh2o.multi-user-browser
productName: Multi-User Browser
copyright: Copyright © 2026 mmmmh2o

# 构建配置
directories:
  output: dist
  buildResources: build

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-${version}-Setup.${ext}"

# NSIS 安装器配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Multi-User Browser"

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
  artifactName: "${productName}-${version}.${ext}"

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icon.png
  category: Network
  artifactName: "${productName}-${version}.${ext}"

# 文件包含
files:
  - src/**/*
  - "!src/**/*.test.js"
  - "!src/**/*.spec.js"
  - package.json

# 额外资源
extraResources:
  - from: assets/
    to: assets/
    filter:
      - "**/*"
  - from: resources/aria2/
    to: aria2/
    filter:
      - "aria2c*"

# 自动更新
publish:
  provider: github
  owner: mmmmh2o
  repo: multi-user-browser
