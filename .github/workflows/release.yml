name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            build_cmd: npm run build:dir
            artifact_glob: dist/*
            asset_name: multi-user-browser-linux
          - os: windows-latest
            build_cmd: npm run build
            artifact_glob: dist/*.exe
            asset_name: multi-user-browser-windows
          - os: macos-latest
            build_cmd: npm run build:dir
            artifact_glob: dist/*
            asset_name: multi-user-browser-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: ${{ matrix.build_cmd }}
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          draft: true
